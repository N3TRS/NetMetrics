name: Trigger auto deployment for loki

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/loki-AutoDeployTrigger-67cf1643-1e3d-4793-9197-b2ad54c0d86e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LOKI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LOKI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LOKI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: netomnic0de.azurecr.io
          registryUsername: ${{ secrets.LOKI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LOKI_REGISTRY_PASSWORD }}
          containerAppName: loki
          resourceGroup: Omnicode-Arsw
          imageToBuild: netomnic0de.azurecr.io/loki:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


