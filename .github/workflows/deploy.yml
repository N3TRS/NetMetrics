name: Deploy Observability Stack 

on:
  push:
    branches: [ main ]
    paths:
      - 'grafana/**'
      - 'loki/**'
      - 'prometheus/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: grafana
            client_id_secret: GRAFANA_AZURE_CLIENT_ID
          - service: loki
            client_id_secret: LOKI_AZURE_CLIENT_ID
          - service: prometheus
            client_id_secret: PROMETHEUS_AZURE_CLIENT_ID
    
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets[matrix.client_id_secret] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login -n netomnic0de

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          docker build -t netomnic0de.azurecr.io/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Push Docker image to ACR
        run: |
          docker push netomnic0de.azurecr.io/${{ matrix.service }}:${{ github.sha }}

      - name: Deploy ${{ matrix.service }} to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerImage: netomnic0de.azurecr.io/${{ matrix.service }}:${{ github.sha }}
          containerAppName: ${{ matrix.service }}
          resourceGroup: Omnicode-Arsw