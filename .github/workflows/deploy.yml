name: Deploy Observability Stack

on:
  push:
    branches: [main]
    paths:
      - 'grafana/**'
      - 'loki/**'
      - 'prometheus/**'
  workflow_dispatch:

env:
  RESOURCE_GROUP: omnicode-arsw
  ACR_NAME: NetOmniC0de
  ACR_SERVER: netomnic0de.azurecr.io    
  ENVIRONMENT: observability-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: grafana
            port: 3000
            ingress: external
          - service: loki
            port: 3100
            ingress: internal
          - service: prometheus
            port: 9090
            ingress: internal

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE="${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }}"
          docker build -t $IMAGE ./${{ matrix.service }}
          docker push $IMAGE

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade --allow-preview true

      - name: Deploy ${{ matrix.service }}
        run: |
          IMAGE="${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }}"

          if az containerapp show \
               --name ${{ matrix.service }} \
               --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ matrix.service }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image $IMAGE
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name ${{ matrix.service }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.ENVIRONMENT }} \
              --image $IMAGE \
              --target-port ${{ matrix.port }} \
              --ingress ${{ matrix.ingress }} \
              --min-replicas 1 \
              --max-replicas 1 \
              --secrets "acr-password=${{ secrets.REGISTRY_PASSWORD }}" \
              --registry-server ${{ env.ACR_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password secretref:acr-password
          fi