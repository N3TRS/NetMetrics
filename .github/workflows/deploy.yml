name: Deploy Observability Stack 

on:
  push:
    branches: [ main ]
    paths:
      - 'grafana/**'
      - 'loki/**'
      - 'prometheus/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: grafana
            client_id_secret: GRAFANA_AZURE_CLIENT_ID
            port: 3000
          - service: loki
            client_id_secret: LOKI_AZURE_CLIENT_ID
            port: 3100
          - service: prometheus
            client_id_secret: PROMETHEUS_AZURE_CLIENT_ID
            port: 9090
    
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets[matrix.client_id_secret] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker image for ${{ matrix.service }}
        run: |
          docker build -t netomnic0de.azurecr.io/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Push Docker image to ACR
        run: |
          docker push netomnic0de.azurecr.io/${{ matrix.service }}:${{ github.sha }}

      - name: Install Azure CLI Container Apps extension
        run: az extension add --name containerapp --upgrade --allow-preview true

      - name: Deploy ${{ matrix.service }} to Container Apps
        run: |
          IMAGE="netomnic0de.azurecr.io/${{ matrix.service }}:${{ github.sha }}"
          
          if az containerapp show --name ${{ matrix.service }} --resource-group Omnicode-Arsw &>/dev/null; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ matrix.service }} \
              --resource-group Omnicode-Arsw \
              --image $IMAGE \
              --target-port ${{ matrix.port }}
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name ${{ matrix.service }} \
              --resource-group Omnicode-Arsw \
              --environment observability-env \
              --image $IMAGE \
              --target-port ${{ matrix.port }} \
              --ingress external \
              --registry-server netomnic0de.azurecr.io \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }}
          fi