name: Deploy Observability Stack (Unified)

on:
  push:
    branches: [ main ]
    paths:
      - 'grafana/**'
      - 'loki/**'
      - 'prometheus/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'grafana/**'
      - 'loki/**'
      - 'prometheus/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # --- JOB PARA GRAFANA ---
  deploy-grafana:
    if: contains(github.event.head_commit.modified, 'grafana/') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.GRAFANA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.GRAFANA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.GRAFANA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy Grafana
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/grafana
          dockerfilePath: Dockerfile 
          registryUrl: netomnic0de.azurecr.io
          containerAppName: grafana
          resourceGroup: Omnicode-Arsw
          imageToBuild: netomnic0de.azurecr.io/grafana:${{ github.sha }}

  # --- JOB PARA LOKI ---
  deploy-loki:
    if: contains(github.event.head_commit.modified, 'loki/') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LOKI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LOKI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LOKI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy Loki
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/loki
          dockerfilePath: Dockerfile 
          registryUrl: netomnic0de.azurecr.io
          containerAppName: loki
          resourceGroup: Omnicode-Arsw
          imageToBuild: netomnic0de.azurecr.io/loki:${{ github.sha }}

  # --- JOB PARA PROMETHEUS ---
  deploy-prometheus:
    if: contains(github.event.head_commit.modified, 'prometheus/') || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PROMETHEUS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PROMETHEUS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PROMETHEUS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy Prometheus
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/prometheus
          dockerfilePath: Dockerfile 
          registryUrl: netomnic0de.azurecr.io
          containerAppName: prometheus
          resourceGroup: Omnicode-Arsw
          imageToBuild: netomnic0de.azurecr.io/prometheus:${{ github.sha }}