name: Deploy Observability Stack

on:
  push:
    branches: [main]
    paths:
      - 'grafana/**'
      - 'loki/**'
      - 'prometheus/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: omnicode-arsw
  ACR_NAME: NetOmniC0de
  ENVIRONMENT: observability-env

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: grafana
            port: 3000
            ingress: external
          - service: loki
            port: 3100
            ingress: internal
          - service: prometheus
            port: 9090
            ingress: internal

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.service }}:${{ github.sha }}"
          docker build -t $IMAGE ./${{ matrix.service }}
          docker push $IMAGE

      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade --allow-preview true

      - name: Deploy ${{ matrix.service }}
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ matrix.service }}:${{ github.sha }}"

          if az containerapp show \
               --name ${{ matrix.service }} \
               --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ matrix.service }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image $IMAGE
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name ${{ matrix.service }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.ENVIRONMENT }} \
              --image $IMAGE \
              --target-port ${{ matrix.port }} \
              --ingress ${{ matrix.ingress }} \
              --min-replicas 1 \
              --max-replicas 1 \
              --registry-server ${{ env.ACR_NAME }}.azurecr.io \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }}
          fi